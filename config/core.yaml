# LureGuard Core Configuration

thresholds:
  t1: 0.55
  t2: 0.85

policy:
  min_attempts_for_alert: 8

llm:
  provider: disabled
  model: ""
  base_url: ""
  timeout_seconds: 60
  max_tokens: 512

cowrie_profiles:
  dev-server:
    host: cowrie-dev
    port: 2222
  db-server:
    host: cowrie-db
    port: 2223

window_seconds: 300
tick_interval_seconds: 2
dnat_ttl_minutes: 60
