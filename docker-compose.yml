services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: wazuh-manager
    restart: unless-stopped

    ports:
      - "1514:1514/tcp"
      - "1515:1515/tcp"

    environment:
      - WAZUH_MANAGER_NAME=lureguard-manager

    volumes:
      - wazuh_etc:/var/ossec/etc        # ← persists keys, config, certs
      - wazuh_data:/var/ossec/data      # ← persists db, queue
      - wazuh_logs:/var/ossec/logs      # ← persists alerts, ossec.log
      - ./wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro

volumes:
  wazuh_etc:
  wazuh_data:
  wazuh_logs: