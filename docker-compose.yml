services:
  postgres:
    image: postgres:16-alpine
    container_name: lureguard-postgres
    restart: unless-stopped
    networks:
      - lureguard-net
    environment:
      POSTGRES_USER: lureguard
      POSTGRES_PASSWORD: lureguard
      POSTGRES_DB: lureguard
    ports:
      - "5433:5432"
    volumes:
      - lureguard_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lureguard -d lureguard"]
      interval: 3s
      timeout: 5s
      retries: 10

  lureguard-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: lureguard-core
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      - lureguard-net
    depends_on:
      postgres:
        condition: service_healthy
      cowrie-dev:
        condition: service_started
      cowrie-db:
        condition: service_started
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MODELS_DIR: /app/models
      CONFIG_PATH: /app/config/core.yaml
    volumes:
      - ./ml/models:/app/models:ro
      - ./config:/app/config:ro
      - ./migrations:/app/migrations

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: wazuh-manager
    restart: unless-stopped
    networks:
      - lureguard-net
    depends_on:
      - lureguard-core
      - cowrie-dev
      - cowrie-db
    ports:
      - "1514:1514/tcp"
      - "1515:1515/tcp"
    environment:
      WAZUH_MANAGER_NAME: lureguard-manager
    volumes:
      - wazuh_etc:/var/ossec/etc
      - wazuh_data:/var/ossec/data
      - wazuh_logs:/var/ossec/logs
      - ./wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./wazuh/integrations/custom-lureguard:/var/ossec/integrations/custom-lureguard:ro
      - ./wazuh/integrations/custom-lureguard.py:/var/ossec/integrations/custom-lureguard.py:ro
      - cowrie_dev_logs:/var/log/cowrie/dev-server:ro
      - cowrie_db_logs:/var/log/cowrie/db-server:ro

  cowrie-dev:
    image: cowrie/cowrie:latest
    container_name: cowrie-dev
    restart: unless-stopped
    networks:
      - lureguard-net
    hostname: dev-machine
    ports:
      - "2222:2222"
    volumes:
      - ./cowrie/dev-server/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - cowrie_dev_logs:/cowrie/cowrie-git/var/log/cowrie

  cowrie-db:
    image: cowrie/cowrie:latest
    container_name: cowrie-db
    restart: unless-stopped
    networks:
      - lureguard-net
    hostname: db-prod-01
    ports:
      - "2223:2222"
    volumes:
      - ./cowrie/db-server/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - cowrie_db_logs:/cowrie/cowrie-git/var/log/cowrie

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: lureguard-grafana
    restart: unless-stopped
    networks:
      - lureguard-net
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: lureguard
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
      - lureguard_grafana:/var/lib/grafana

networks:
  lureguard-net:
    driver: bridge

volumes:
  lureguard_pg:
  lureguard_grafana:
  wazuh_etc:
  wazuh_data:
  wazuh_logs:
  cowrie_dev_logs:
  cowrie_db_logs:
