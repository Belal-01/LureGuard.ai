<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <ruleset>
    <!-- Default rulesets -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>ruleset/rules/0030-syslog_rules.xml</rule_exclude>

    <!-- User-defined decoders and rules -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <allowed-ips>0.0.0.0/0</allowed-ips>
  </remote>

  <!-- Agent enrollment (required for POST /agents and authd on port 1515) -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <force_insert>yes</force_insert>
    <force_time>0</force_time>
    <purge>yes</purge>
    <use_password>no</use_password>
  </auth>

  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- Required for Wazuh 4.14+ vulnerability scanner (needs wazuh-indexer on lureguard-net) -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh-indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/filebeat/certs/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/filebeat/certs/filebeat.pem</certificate>
      <key>/etc/filebeat/certs/filebeat-key.pem</key>
    </ssl>
  </indexer>

  <!-- ── integratord → LureGuard Core ──────────────────── -->
  <!-- REQ-SI-008: forwards matching alerts to /wazuh/event -->
  <integration>
    <name>custom-lureguard</name>
    <!-- Same Docker network as lureguard-core (docker-compose service name) -->
    <hook_url>http://lureguard-core:8080/wazuh/event</hook_url>
    <level>3</level>
    <group>authentication_failed,authentication_success,sshd,syscheck,rootcheck,lureguard_custom</group>
    <alert_format>json</alert_format>
  </integration>

  <!-- Cowrie honeypot JSON logs (shared Docker volumes from cowrie-dev / cowrie-db) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/cowrie/dev-server/cowrie.json</location>
    <label key="profile_id">dev-server</label>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/cowrie/db-server/cowrie.json</location>
    <label key="profile_id">db-server</label>
  </localfile>
</ossec_config>
