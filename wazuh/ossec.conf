<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>
</ossec_config>

<ossec_config>
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <allowed-ips>0.0.0.0/0</allowed-ips>
  </remote>
</ossec_config>

<ossec_config>
  <!-- ── integratord → LureGuard Core ──────────────────── -->
  <!-- REQ-SI-008: forwards matching alerts to /wazuh/event -->
  <integration>
    <name>lureguard</name>
    <hook_url>http://lureguard-core:8080/wazuh/event</hook_url>
    <level>3</level>
    <group>authentication_failed,authentication_success,sshd,syscheck,rootcheck,lureguard_custom</group>
    <alert_format>json</alert_format>
  </integration>
</ossec_config>