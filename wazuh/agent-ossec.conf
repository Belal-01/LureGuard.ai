<ossec_config>

  <!-- ── Client connection ─────────────────────────────── -->
  <client>
    <server>
      <address>__WAZUH_MANAGER_IP__</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu24, ubuntu24.04</config-profile>
    <notify_time>20</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ── SOURCE 1: auth.log (SSH + sudo + PAM) ─────────── -->
  <!-- REQ-F-COL-001: SSH auth events, ≤2s delivery         -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- ── SOURCE 2: syslog (general OS events) ─────────── -->
  <!-- REQ-F-COL-010: stored in EVENT with channel=syslog   -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- journald as secondary syslog source -->
  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <!-- ── SOURCE 3: FIM — File Integrity Monitoring ─────── -->
  <!-- REQ-F-COL-007, REQ-F-COL-011                         -->
  <!-- Watches: /etc, /root/.ssh, /usr/bin, /usr/sbin       -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- SRS-required directories with realtime -->
    <directories realtime="yes">/etc</directories>
    <directories realtime="yes">/root/.ssh</directories>
    <directories realtime="yes">/usr/bin</directories>
    <directories realtime="yes">/usr/sbin</directories>

    <!-- Standard system dirs (non-realtime, periodic scan) -->
    <directories>/bin,/sbin,/boot</directories>

    <!-- Ignore noisy files -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
    <process_priority>10</process_priority>
    <max_eps>50</max_eps>

    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
      <max_eps>10</max_eps>
    </synchronization>
  </syscheck>

  <!-- ── SOURCE 4: cowrie.json ─────────────────────────── -->
  <!-- REQ-F-COL-002: honeypot session logs (when Cowrie logs are on this host) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/cowrie/dev-server/cowrie.json</location>
    <label key="profile_id">dev-server</label>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/cowrie/db-server/cowrie.json</location>
    <label key="profile_id">db-server</label>
  </localfile>

  <!-- ── Rootcheck ─────────────────────────────────────── -->
  <!-- REQ-F-COL-012                                        -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
    <ignore>/var/lib/containerd</ignore>
    <ignore>/var/lib/docker/overlay2</ignore>
  </rootcheck>

  <!-- ── System inventory ──────────────────────────────── -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <users>yes</users>
  </wodle>

  <!-- ── SCA / CIS compliance ─────────────────────────── -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ── SOURCE 5: Docker container stdout (generic — any containerized app) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/lib/docker/containers/*/*-json.log</location>
  </localfile>

  <!-- ── SOURCE 6: Host web server logs (fallback for non-containerized apps) -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- ── Active response ───────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ── Logging ───────────────────────────────────────── -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>